# .github/workflows/update-dashboard.yml
#
# Two separate jobs depending on trigger:
#
# [push to main]  → verify: checkout → build only (no fetch, no commit, no Cloudflare deploy)
#                   Guards against broken builds being merged.
#
# [hourly schedule / manual dispatch]
#                 → update: fetch check-ins → if no new check-ins, exit gracefully.
#                   If new check-ins: rebuild → commit & push → Cloudflare Pages auto-deploys.
#
# Required repository secrets:
#   FOURSQUARE_TOKEN   — Foursquare OAuth token
#   NETLIFY_SITE_ID    — found in Netlify site settings → General → Site ID
#   NETLIFY_AUTH_TOKEN — personal access token from app.netlify.com/user/applications

name: Update check-in dashboard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */1  * * *"   # every hour
  push:
    branches: [main]         # verify build on every push (no deploy)
  workflow_dispatch:         # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:

  # ── Verify: build-only check on every push to main (no Cloudflare deploy) ──
  verify:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard (verify only — no commit or deploy)
        run: |
          python scripts/build.py \
            --input data/checkins.csv \
            --config-dir config \
            --output-dir .

  # ── Update: fetch → skip if no new check-ins → rebuild → commit → deploy ──
  update:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Fetch new check-ins ───────────────────────────────────────────────
      - name: Fetch new Swarm check-ins
        id: fetch
        env:
          FOURSQUARE_TOKEN: ${{ secrets.FOURSQUARE_TOKEN }}
        run: |
          if [ -z "$FOURSQUARE_TOKEN" ]; then
            echo "⚠️  FOURSQUARE_TOKEN secret is not set — skipping fetch."
            echo "CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            python scripts/fetch_checkins.py --token "$FOURSQUARE_TOKEN" --csv data/checkins.csv >> "$GITHUB_OUTPUT"
          fi

      # ── 4. Exit gracefully if no new check-ins ───────────────────────────────
      - name: Skip if no new check-ins
        if: steps.fetch.outputs.CHANGED != 'true'
        run: |
          echo "No new check-ins — nothing to rebuild or deploy."
          exit 0

      # ── 5. Rebuild dashboard ─────────────────────────────────────────────────
      - name: Rebuild dashboard
        if: steps.fetch.outputs.CHANGED == 'true'
        run: |
          python scripts/build.py \
            --input data/checkins.csv \
            --config-dir config \
            --output-dir .

      # ── 6. Commit & push → Cloudflare Pages auto-deploys on every push ───────
      - name: Commit updated files
        if: steps.fetch.outputs.CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/checkins.csv index.html trips.html feed.html companions.html world_cities.html venues.html

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            NEW_ROWS=$(git diff --cached --stat data/checkins.csv | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "0")
            git commit -m "chore: auto-update dashboard [${TIMESTAMP}] (+${NEW_ROWS} check-ins)"
            git push
          fi

  # ── Monthly job: deploy to Netlify on the last day of each month ────────────
  netlify-monthly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: update

    steps:
      - name: Check if today is last day of month
        id: lastday
        run: |
          TODAY=$(date -u +%d)
          LAST=$(date -u -d "$(date -u +%Y-%m-01) +1 month -1 day" +%d)
          if [ "$TODAY" = "$LAST" ]; then
            echo "is_last_day=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_last_day=false" >> "$GITHUB_OUTPUT"
            echo "Not the last day of month ($TODAY/$LAST) — skipping Netlify deploy."
          fi

      - uses: actions/checkout@v4
        if: steps.lastday.outputs.is_last_day == 'true'

      - name: Deploy to Netlify
        if: steps.lastday.outputs.is_last_day == 'true'
        env:
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli
          netlify deploy \
            --site  "$NETLIFY_SITE_ID" \
            --auth  "$NETLIFY_AUTH_TOKEN" \
            --dir   "." \
            --prod \
            --message "Monthly deploy $(date -u +%Y-%m-%d)"
          echo "Netlify deploy complete."
