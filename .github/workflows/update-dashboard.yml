# .github/workflows/update-dashboard.yml
#
# Runs every hour (and on every push to main).
# 1. Fetches new Swarm check-ins via the Foursquare v2 API.
# 2. Rebuilds index.html + trips.html.
# 3. Commits and pushes updated files back to the repo.
#    → Cloudflare Pages picks up every commit automatically (connected via Git).
#    → Netlify is triggered manually only on the last day of each month via
#      a separate scheduled job (netlify-monthly), to stay within free tier.
#
# Required repository secrets:
#   FOURSQUARE_TOKEN        — Foursquare OAuth token
#   NETLIFY_SITE_ID    — found in Netlify site settings → General → Site ID
#   NETLIFY_AUTH_TOKEN — personal access token from app.netlify.com/user/applications

name: Update check-in dashboard

on:
  schedule:
    - cron: "0 */1  * * *"   # every hour
  push:
    branches: [main]         # rebuild on every push
  workflow_dispatch:         # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  # ── Main job: fetch → rebuild → commit (Cloudflare deploys on every push) ──
  update:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Fetch new check-ins ───────────────────────────────────────────────
      - name: Fetch new Swarm check-ins
        id: fetch
        env:
          FOURSQUARE_TOKEN: ${{ secrets.FOURSQUARE_TOKEN }}
        run: |
          if [ -z "$FOURSQUARE_TOKEN" ]; then
            echo "⚠️  FOURSQUARE_TOKEN secret is not set in repository Settings → Secrets and variables → Actions."
            echo "   Add it and re-run this workflow. Skipping fetch for now."
            echo "CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            python fetch_checkins.py --token "$FOURSQUARE_TOKEN" --csv checkins.csv >> "$GITHUB_OUTPUT"
          fi

      # ── 4. Rebuild dashboard ─────────────────────────────────────────────────
      - name: Rebuild dashboard
        run: |
          python build.py \
            --input checkins.csv \
            --config-dir config \
            --output-dir .

      # ── 5. Commit & push → Cloudflare Pages auto-deploys on every push ───────
      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add checkins.csv index.html trips.html

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            NEW_ROWS=$(git diff --cached --stat checkins.csv | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "0")
            git commit -m "chore: auto-update dashboard [${TIMESTAMP}] (+${NEW_ROWS} check-ins)"
            git push
          fi

  # ── Monthly job: deploy to Netlify on the last day of each month ────────────
  netlify-monthly:
    runs-on: ubuntu-latest
    # Run at 23:00 UTC on the 28th, 29th, 30th, and 31st — but only proceed
    # if today is actually the last day of the month (checked in the step below).
    if: github.event_name == 'schedule'
    needs: update

    steps:
      - name: Check if today is last day of month
        id: lastday
        run: |
          TODAY=$(date -u +%d)
          LAST=$(date -u -d "$(date -u +%Y-%m-01) +1 month -1 day" +%d)
          if [ "$TODAY" = "$LAST" ]; then
            echo "is_last_day=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_last_day=false" >> "$GITHUB_OUTPUT"
            echo "Not the last day of month ($TODAY/$LAST) — skipping Netlify deploy."
          fi

      - uses: actions/checkout@v4
        if: steps.lastday.outputs.is_last_day == 'true'

      - name: Deploy to Netlify
        if: steps.lastday.outputs.is_last_day == 'true'
        env:
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli
          netlify deploy \
            --site  "$NETLIFY_SITE_ID" \
            --auth  "$NETLIFY_AUTH_TOKEN" \
            --dir   "." \
            --prod \
            --message "Monthly deploy $(date -u +%Y-%m-%d)"
          echo "Netlify deploy complete."
