name: Weekly Dashboard Update

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest check-ins
        env:
          FOURSQUARE_TOKEN: ${{ secrets.FOURSQUARE_TOKEN }}
        run: python foursquare_checkins.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit & push index.html only
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Nothing changed" || (
            git commit -m "📍 Weekly update $(date -u +%Y-%m-%d)"
            git push
          )
          # checkins.csv and checkins.json are NOT committed (in .gitignore)
          # They exist only during the Actions run, then discarded
